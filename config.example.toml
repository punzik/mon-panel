# mon-panel configuration
# All fields are optional — missing values use defaults.
# Sections can appear in any order.

# --- Panel geometry ---

[panel]
# Panel width in pixels (at least 33, no wider than the screen)
width = 260
# Which edge of the screen to dock to: "Left" or "Right"
side = "Right"
# Slide animation duration in milliseconds
animation_duration_ms = 200
# Width of the invisible trigger zone at the screen edge, in pixels
trigger_width = 3

# --- Telemetry ---

[telemetry]
# How often to poll for metrics and record history, in milliseconds
refresh_interval_ms = 10000
# URL of llama-swap (OpenAI-compatible /v1/models endpoint)
llama_swap_url = "http://localhost:8080"
# API key for llama-swap (Bearer token, required if auth is enabled)
# llama_swap_api_key = "sk-..."
# sysmetrics URL (alternative to Beszel for system metrics)
# If [beszel] is present, it takes priority over this.
# telemetry_url = "http://172.16.3.66:9100"

# --- Beszel Hub ---
# System metrics via PocketBase REST API.
# Leave this section out entirely if you don't use Beszel.

[beszel]
hub_url = "https://mon.example.com"
email = "user@example.com"
password = "secret"
system_id = "abc123def456"

# --- Display ---

[display]
# Pango font family string
font_family = "Aporetic Sans"
# Base font size in points
font_size = 13.0

# --- Colors ---
# Each color is RGBA, values 0.0–1.0.
# Omit a color to use its default.

[colors]
# Panel background
bg = { r = 0.08, g = 0.08, b = 0.10, a = 0.95 }
# Primary text color
fg = { r = 0.9, g = 0.9, b = 0.92, a = 1.0 }
# Default graph / active indicator (fallback for per-graph colors)
accent = { r = 0.3, g = 0.7, b = 1.0, a = 1.0 }
# High temperature, warnings
warn = { r = 1.0, g = 0.6, b = 0.3, a = 1.0 }
# Section headers, inactive models
dim = { r = 0.5, g = 0.5, b = 0.55, a = 1.0 }
# Graph background
bar_bg = { r = 0.2, g = 0.2, b = 0.25, a = 1.0 }

# Per-graph colors (optional — fall back to accent for utilisation, fg for temp)
# cpu_util = { r = 0.3, g = 0.7, b = 1.0, a = 1.0 }
# cpu_temp = { r = 0.9, g = 0.9, b = 0.92, a = 1.0 }
# ram = { r = 0.3, g = 0.7, b = 1.0, a = 1.0 }
# gpu_util = { r = 0.3, g = 0.7, b = 1.0, a = 1.0 }
# gpu_vram = { r = 0.3, g = 0.7, b = 1.0, a = 1.0 }
# gpu_temp = { r = 0.9, g = 0.9, b = 0.92, a = 1.0 }

# --- Temperature thresholds ---
# When exceeded, the graph color switches to warn.

[thresholds]
cpu_temp_warn = 80  # °C
gpu_temp_warn = 80  # °C (applies to all GPUs)